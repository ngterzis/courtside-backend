name: ML pipeline

# Builds the Dockerfile.ml image (Ingest/PrepareData/Evaluate steps), pushes it to
# the pipeline's ECR repo, and upserts the SageMaker Pipeline definition
# (ml/pipeline.py) so it matches this code. Never starts a run — see ml/README.md
# for how to trigger one on demand. Infra (ECR repo, feature group, model registry,
# MLflow, sagemaker_exec role) lives in the courtside-infra repo.
#
# Required GitHub config — all repo secrets (not variables) so ARNs/paths never
# print in plaintext into workflow logs on this public repo. All -> terraform
# output in courtside-infra/envs/prod:
#   secrets.AWS_DEPLOY_ROLE_ARN     -> github_actions_role_arn
#   secrets.ML_FEATURE_GROUP_NAME   -> ml_feature_group_name
#   secrets.ML_OFFLINE_STORE_S3     -> ml_offline_store_s3
#   secrets.ML_ATHENA_OUTPUT_S3     -> ml_athena_output_s3
#   secrets.ML_SAGEMAKER_ROLE_ARN   -> ml_sagemaker_role_arn
#   secrets.ML_MLFLOW_TRACKING_URI  -> mlflow_tracking_server_arn
#   secrets.ML_MODEL_PACKAGE_GROUP  -> ml_model_package_group
#   secrets.ML_ENDPOINT_NAME        -> ml_endpoint_name
#   secrets.ML_PIPELINE_NAME        -> ml_pipeline_name
#   secrets.DB_CLUSTER_ARN          -> db_cluster_arn
#   secrets.DB_SECRET_ARN           -> db_credentials_secret_arn

on:
  push:
    branches: [main]
    paths:
      - "ml/**"
      - "src/courtside/ml/**"
      - "Dockerfile.ml"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

concurrency:
  group: ml-pipeline
  cancel-in-progress: false

permissions:
  id-token: write # OIDC
  contents: read

env:
  AWS_REGION: eu-central-1
  ML_ECR_REPOSITORY: courtside-prod-ml-pipeline

jobs:
  upsert:
    name: Build image, upsert pipeline
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ml image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ML_ECR_REPOSITORY"
          docker build -f Dockerfile.ml -t "$IMAGE:$GITHUB_SHA" -t "$IMAGE:latest" .
          docker push "$IMAGE:$GITHUB_SHA"
          docker push "$IMAGE:latest"
          echo "image=$IMAGE:latest" >> "$GITHUB_OUTPUT"

      - uses: astral-sh/setup-uv@v3

      - name: Upsert pipeline definition
        env:
          ML_PIPELINE_IMAGE_URI: ${{ steps.build.outputs.image }}
          FEATURE_GROUP_NAME: ${{ secrets.ML_FEATURE_GROUP_NAME }}
          FEATURE_STORE_OFFLINE_S3: ${{ secrets.ML_OFFLINE_STORE_S3 }}
          ATHENA_OUTPUT_S3: ${{ secrets.ML_ATHENA_OUTPUT_S3 }}
          SAGEMAKER_ROLE_ARN: ${{ secrets.ML_SAGEMAKER_ROLE_ARN }}
          MLFLOW_TRACKING_URI: ${{ secrets.ML_MLFLOW_TRACKING_URI }}
          MODEL_PACKAGE_GROUP: ${{ secrets.ML_MODEL_PACKAGE_GROUP }}
          ENDPOINT_NAME: ${{ secrets.ML_ENDPOINT_NAME }}
          PIPELINE_NAME: ${{ secrets.ML_PIPELINE_NAME }}
          DB_CLUSTER_ARN: ${{ secrets.DB_CLUSTER_ARN }}
          DB_SECRET_ARN: ${{ secrets.DB_SECRET_ARN }}
        run: |
          uv sync --group ml --no-dev
          uv run --group ml python -m ml.pipeline upsert
